<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Get Things Done</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #141418;
    --surface2: #1e1e26;
    --border: #2a2a36;
    --accent: #c8f060;
    --accent2: #6b8cff;
    --text: #f0eee8;
    --muted: #6b6b7e;
    --done: #3a3a48;
    --radius: 14px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Mono', monospace;
    --font-serif: 'Instrument Serif', serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 36px;
    animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: slideDown 0.6s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    flex: 1;
    text-align: center;
  }

  .stat-num {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Input area */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    animation: slideDown 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .task-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .task-input::placeholder { color: var(--muted); }

  .task-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 240, 96, 0.12);
  }

  .add-btn {
    background: var(--accent);
    color: #0c0c0e;
    border: none;
    border-radius: var(--radius);
    padding: 14px 22px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.2s;
  }

  .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(200,240,96,0.3); }
  .add-btn:active { transform: translateY(0); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    animation: slideDown 0.6s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 16px;
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--accent2); }
  .filter-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: slideDown 0.6s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, background 0.3s, opacity 0.3s, transform 0.3s;
    animation: itemIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .task-item:hover { border-color: var(--border); background: var(--surface2); }

  .task-item.done {
    opacity: 0.5;
    background: var(--done);
    border-color: transparent;
  }

  @keyframes itemIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-btn:hover { border-color: var(--accent); }

  .task-item.done .check-btn {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-icon {
    display: none;
    width: 12px;
    height: 12px;
  }

  .task-item.done .check-icon { display: block; }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.5;
    transition: all 0.2s;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-priority {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--font-display);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .prio-high { background: rgba(255,100,80,0.15); color: #ff6450; }
  .prio-mid  { background: rgba(107,140,255,0.15); color: var(--accent2); }
  .prio-low  { background: rgba(200,240,96,0.12); color: var(--accent); }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s, transform 0.15s;
    line-height: 1;
  }

  .delete-btn:hover { color: #ff6450; transform: scale(1.2); }

  /* Priority selector */
  .prio-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 12px;
    border-radius: 8px;
    padding: 14px 10px;
    outline: none;
    cursor: pointer;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .empty p {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 16px;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 20px;
    animation: slideDown 0.6s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Clear done btn */
  .clear-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    display: none;
  }

  .clear-btn:hover { border-color: #ff6450; color: #ff6450; }
  .clear-btn.visible { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    animation: slideDown 0.6s 0.4s both;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Task<span>Flow</span></div>
    <div class="tagline">clarity through action</div>
  </header>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="total-count">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="active-count">0</span>
      <span class="stat-label">Active</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="done-count">0</span>
      <span class="stat-label">Done</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="pct-label">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="input-row">
    <input class="task-input" id="task-input" type="text" placeholder="What needs to be done?" maxlength="100"/>
    <select class="prio-select" id="prio-select">
      <option value="high">🔴 High</option>
      <option value="mid" selected>🔵 Mid</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" onclick="addTask()">ADD</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <button class="clear-btn" id="clear-btn" onclick="clearDone()">✕ Clear completed tasks</button>

  <footer>Built with TaskFlow · Stay focused, ship faster.</footer>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tf-tasks') || '[]');
  let filter = 'all';

  if (tasks.length === 0) {
    tasks = [
      { id: 1, text: 'Design the homepage wireframes', done: true, priority: 'high' },
      { id: 2, text: 'Write API documentation', done: false, priority: 'mid' },
      { id: 3, text: 'Review pull requests', done: false, priority: 'high' },
      { id: 4, text: 'Update project dependencies', done: false, priority: 'low' },
    ];
    save();
  }

  function save() {
    localStorage.setItem('tf-tasks', JSON.stringify(tasks));
    render();
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const prio = document.getElementById('prio-select').value;
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false, priority: prio });
    input.value = '';
    save();
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('task-list');
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const active = total - done;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('total-count').textContent = total;
    document.getElementById('active-count').textContent = active;
    document.getElementById('done-count').textContent = done;
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    const clearBtn = document.getElementById('clear-btn');
    clearBtn.classList.toggle('visible', done > 0);

    const filtered = tasks.filter(t =>
      filter === 'all' ? true :
      filter === 'active' ? !t.done :
      t.done
    );

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${filter === 'done' ? '🎉' : '✦'}</div>
          <p>${filter === 'done' ? 'Nothing completed yet.' : 'All clear! Add a task above.'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleDone(${t.id})" title="Toggle done">
          <svg class="check-icon" viewBox="0 0 12 12" fill="none" stroke="#0c0c0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1.5,6 4.5,9 10.5,3"/>
          </svg>
        </button>
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="task-priority prio-${t.priority}">${t.priority}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">×</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
